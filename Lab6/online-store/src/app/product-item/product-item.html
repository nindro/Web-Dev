<div class="product-card">
  <div class="product-image">
    <img [src]="product.image" [alt]="product.name">
  </div>

  <div class="product-info">
    <h3>{{ product.name }}</h3>
    <p class="description">{{ product.description }}</p>
    
    <div class="details">
      <span class="price">{{ product.price }} ₸</span>
      <span class="rating">⭐ {{ product.rating }}</span>
    </div>
  </div>

  <div class="product-actions">
    <button (click)="like()" class="like-btn" [class.liked]="product.likes > 0">
      ❤️ {{ product.likes }}
    </button>

    <div class="share-group">
      <button (click)="share('wa')" class="share-btn">WhatsApp</button>
      <button (click)="share('tg')" class="share-btn">Telegram</button>
    </div>

    <button (click)="delete()" class="delete-btn">Delete</button>
  </div>
</div>
